version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: senic-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-senic_billing}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - senic-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - senic-network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}-backend:latest
    container_name: senic-backend
    environment:
      ConnectionStrings__DefaultConnection: "Host=database;Port=${DB_PORT:-5432};Database=${DB_NAME:-senic_billing};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}"
      JwtSettings__SecretKey: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER:-SenicBillingNext}
      JwtSettings__Audience: ${JWT_AUDIENCE:-SenicBillingNextClient}
      JwtSettings__ExpiryMinutes: ${JWT_EXPIRY:-480}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Omise__PublicKey: ${OMISE_PUBLIC_KEY}
      Omise__SecretKey: ${OMISE_SECRET_KEY}
      SmtpSettings__Host: ${SMTP_HOST:-smtp.gmail.com}
      SmtpSettings__Port: ${SMTP_PORT:-587}
      SmtpSettings__Username: ${SMTP_USERNAME}
      SmtpSettings__Password: ${SMTP_PASSWORD}
      SmtpSettings__FromName: ${SMTP_FROM_NAME:-Senic Billing}
      SmtpSettings__FromEmail: ${SMTP_FROM_EMAIL}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - database
    restart: unless-stopped
    networks:
      - senic-network

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:latest
    container_name: senic-frontend
    ports:
      - "${FRONTEND_PORT:-8810}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - senic-network

  minio:
    image: minio/minio:latest
    container_name: senic-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    command: server /data --console-address ":9081"
    ports:
      - "9080:9000"
      - "9081:9001"
    volumes:
      - senic-minio-data:/data
    restart: unless-stopped
    networks:
      - senic-network

  minio-create-bucket:
    image: minio/mc
    container_name: senic-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-password123}; /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME:-senic-billing}; /usr/bin/mc policy set download myminio/${MINIO_BUCKET_NAME:-senic-billing}; exit 0; "
    networks:
      - senic-network

volumes:
  senic-pgdata:
  senic-minio-data:

networks:
  senic-network:
    driver: bridge
