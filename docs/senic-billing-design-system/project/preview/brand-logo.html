<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; display: flex; align-items: center; gap: 34px; }
  .mark { width: 72px; height: 72px; border-radius: 20px; background: var(--gradient-brand); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 46px; box-shadow: 0 8px 20px rgba(234,88,12,.28); }
  .word { font-size: 30px; font-weight: 700; letter-spacing: -.02em; color: var(--color-text); }
  .word b { color: var(--color-primary); font-weight: 700; }
  .eb { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .22em; color: var(--color-text-muted); margin-top: 4px; }
  .small { display: flex; gap: 12px; align-items: center; margin-top: 14px; }
  .m2 { width: 36px; height: 36px; border-radius: 11px; background: var(--gradient-brand); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 22px; }
  .m3 { width: 28px; height: 28px; border-radius: 9px; background: var(--gradient-brand); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 17px; }
</style>
</head>
<body>
  <div class="mark">S</div>
  <div>
    <div class="word">Senic<b>Billing</b></div>
    <div class="eb">Next Generation</div>
    <div class="small">
      <div class="m2">S</div>
      <div class="m3">S</div>
      <span style="font-size:11px;color:var(--color-text-muted);font-family:var(--font-mono)">logo-mark.svg · rounded square rx 28%</span>
    </div>
  </div>
</body>
</html>
