<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #f8fafc; padding: 20px 22px; font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .nm { font-size: 11px; font-weight: 600; color: #0f172a; margin-top: 7px; }
  .hx { font-family: var(--font-mono); font-size: 10px; color: #94a3b8; margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#f0f9ff"></div><div class="nm">primary-50</div><div class="hx">#f0f9ff</div></div>
    <div class="sw"><div class="chip" style="background:#bae6fd"></div><div class="nm">primary-light</div><div class="hx">#bae6fd</div></div>
    <div class="sw"><div class="chip" style="background:#0284c7"></div><div class="nm">primary</div><div class="hx">#0284c7</div></div>
    <div class="sw"><div class="chip" style="background:#0369a1"></div><div class="nm">primary-hover</div><div class="hx">#0369a1</div></div>
    <div class="sw"><div class="chip" style="background:#0c4a6e"></div><div class="nm">primary-dark</div><div class="hx">#0c4a6e</div></div>
    <div class="sw"><div class="chip" style="background:#164e63"></div><div class="nm">accent</div><div class="hx">#164e63</div></div>
    <div class="sw"><div class="chip" style="background:#22d3ee"></div><div class="nm">accent-light</div><div class="hx">#22d3ee</div></div>
  </div>
</body>
</html>
