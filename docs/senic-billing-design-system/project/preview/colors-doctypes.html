<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 20px 22px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .doc { display: flex; align-items: center; gap: 11px; padding: 12px 13px; background: var(--color-surface-solid); border: 1px solid var(--color-border); border-radius: var(--radius-lg); }
  .bar { width: 5px; align-self: stretch; min-height: 38px; border-radius: 9999px; }
  .nm { font-size: 13px; font-weight: 700; color: var(--color-text); }
  .pre { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px; }
  .hx { font-family: var(--font-mono); font-size: 10px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="doc"><div class="bar" style="background:#ea580c"></div><div><div class="nm">ใบกำกับภาษี</div><div class="pre">INV · <span class="hx" style="color:#ea580c">#ea580c</span></div></div></div>
    <div class="doc"><div class="bar" style="background:#16a34a"></div><div><div class="nm">ใบเสร็จรับเงิน</div><div class="pre">RCP · <span class="hx" style="color:#16a34a">#16a34a</span></div></div></div>
    <div class="doc"><div class="bar" style="background:#2563eb"></div><div><div class="nm">บิลเงินสด</div><div class="pre">CSB · <span class="hx" style="color:#2563eb">#2563eb</span></div></div></div>
    <div class="doc"><div class="bar" style="background:#9333ea"></div><div><div class="nm">ใบส่งของ</div><div class="pre">DLV · <span class="hx" style="color:#9333ea">#9333ea</span></div></div></div>
  </div>
</body>
</html>
