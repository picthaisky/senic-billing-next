<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 20px 22px; font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; }
  .g { flex: 1; }
  .swatch { height: 72px; border-radius: var(--radius-lg); border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: flex-end; padding: 9px 11px; }
  .nm { font-size: 11.5px; font-weight: 600; color: var(--color-text); margin-top: 8px; }
  .meta { font-family: var(--font-mono); font-size: 9.5px; color: var(--color-text-muted); margin-top: 1px; }
  .ico { color: #fff; font-weight: 700; font-size: 13px; }
</style>
</head>
<body>
  <div class="row">
    <div class="g">
      <div class="swatch" style="background:linear-gradient(135deg,#ea580c 0%,#f97316 50%,#fb923c 100%)"><span class="ico">Warm Horizon</span></div>
      <div class="nm">gradient-brand · warm</div>
      <div class="meta">135° · #ea580c → #f97316 → #fb923c</div>
    </div>
    <div class="g">
      <div class="swatch" style="background:linear-gradient(135deg,#0284c7 0%,#0ea5e9 50%,#38bdf8 100%)"><span class="ico">Deep Ocean</span></div>
      <div class="nm">gradient-brand · ocean</div>
      <div class="meta">135° · #0284c7 → #0ea5e9 → #38bdf8</div>
    </div>
  </div>
  <div class="row" style="margin-top:14px">
    <div class="g">
      <div class="swatch" style="background:linear-gradient(180deg,#1c1917 0%,#292524 50%,#44403c 100%)"></div>
      <div class="nm">sidebar-bg · warm</div>
      <div class="meta">180° · stone-900 → 800 → 700</div>
    </div>
    <div class="g">
      <div class="swatch" style="background:linear-gradient(135deg,rgba(255,237,213,0.55) 0%,#ffffff 100%);border:1px solid var(--color-border)"></div>
      <div class="nm">gradient-card (glass)</div>
      <div class="meta">peach tint → white · blur(8px)</div>
    </div>
  </div>
</body>
</html>
