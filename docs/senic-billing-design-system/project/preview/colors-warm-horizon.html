<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 20px 22px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .nm { font-size: 11px; font-weight: 600; color: var(--color-text); margin-top: 7px; }
  .hx { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#fff7ed"></div><div class="nm">primary-50</div><div class="hx">#fff7ed</div></div>
    <div class="sw"><div class="chip" style="background:#fed7aa"></div><div class="nm">primary-light</div><div class="hx">#fed7aa</div></div>
    <div class="sw"><div class="chip" style="background:#ea580c"></div><div class="nm">primary</div><div class="hx">#ea580c</div></div>
    <div class="sw"><div class="chip" style="background:#c2410c"></div><div class="nm">primary-hover</div><div class="hx">#c2410c</div></div>
    <div class="sw"><div class="chip" style="background:#9a3412"></div><div class="nm">primary-dark</div><div class="hx">#9a3412</div></div>
    <div class="sw"><div class="chip" style="background:#92400e"></div><div class="nm">accent</div><div class="hx">#92400e</div></div>
    <div class="sw"><div class="chip" style="background:#fbbf24"></div><div class="nm">accent-light</div><div class="hx">#fbbf24</div></div>
  </div>
</body>
</html>
