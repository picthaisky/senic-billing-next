<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_components.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 6px; }
  .focus-demo { border-color: var(--color-primary) !important; box-shadow: 0 0 0 3px rgba(234,88,12,0.1), 0 1px 2px rgba(0,0,0,0.03) !important; }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <label>ชื่อลูกค้า / บริษัท</label>
      <input class="input-field" placeholder="พิมพ์เพื่อค้นหา...">
    </div>
    <div>
      <label>เลขประจำตัวผู้เสียภาษี</label>
      <input class="input-field focus-demo" value="0-1055-48091-12-3" style="font-family:var(--font-mono)">
    </div>
    <div>
      <label>ส่วนลดรวม (บาท)</label>
      <input class="input-field" value="0.00" style="text-align:right">
    </div>
    <div>
      <label style="display:flex;justify-content:space-between"><span>ตั้งค่าภาษี</span></label>
      <div style="display:flex;padding:4px;border-radius:var(--radius-md);background:var(--color-bg-secondary);gap:0">
        <button style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--color-surface-solid);box-shadow:0 1px 3px rgba(0,0,0,.1);font-size:13px;font-weight:500;color:var(--color-text);font-family:var(--font-sans)">ราคาแยกภาษี</button>
        <button style="flex:1;padding:8px;border:none;border-radius:8px;background:transparent;font-size:13px;font-weight:500;color:var(--color-text-muted);font-family:var(--font-sans)">ราคารวมภาษี</button>
      </div>
    </div>
  </div>
</body>
</html>
