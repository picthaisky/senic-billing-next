<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 22px; }
  .eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--color-text-muted); margin: 0 0 12px; }
  .big { font-family: var(--font-display); font-weight: 400; font-size: 40px; line-height: 1.05; color: var(--color-text); letter-spacing: -.01em; }
  .accent { color: var(--color-primary); }
  .row { display: flex; align-items: baseline; gap: 18px; margin-top: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); }
  .line { font-family: var(--font-display); color: var(--color-text); }
</style>
</head>
<body>
  <p class="eyebrow">Display face · var(--font-display) · Kanit (self-hosted)</p>
  <div class="big">ระบบบิลลิ่ง<span class="accent">ออนไลน์</span> · SenicBilling</div>
  <div class="row">
    <span class="line" style="font-size:26px">ใบกำกับภาษี 0123456789</span>
    <span class="meta">Kanit 400 · Thai + Latin + numerals</span>
  </div>
</body>
</html>
