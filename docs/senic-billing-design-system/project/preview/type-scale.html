<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); padding: 22px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--color-border); }
  .r:last-child { border-bottom: none; }
  .spec { width: 110px; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); }
  .sample { color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="spec">3xl · 30 · 800</span><span class="sample" style="font-size:30px;font-weight:800;letter-spacing:-.01em">฿1,050,000</span></div>
  <div class="r"><span class="spec">2xl · 24 · 700</span><span class="sample" style="font-size:24px;font-weight:700">รายได้รวมเดือนนี้</span></div>
  <div class="r"><span class="spec">lg · 18 · 700</span><span class="sample" style="font-size:18px;font-weight:700">แดชบอร์ดภาพรวม</span></div>
  <div class="r"><span class="spec">md · 16 · 600</span><span class="sample" style="font-size:16px;font-weight:600">บันทึกเอกสาร</span></div>
  <div class="r"><span class="spec">sm · 14 · 400</span><span class="sample" style="font-size:14px;font-weight:400">ออกใบกำกับภาษีและจัดการรายการสินค้า</span></div>
  <div class="r"><span class="spec">xs · 11 · 700</span><span class="sample" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted)">รายการสินค้า / บริการ</span></div>
</body>
</html>
